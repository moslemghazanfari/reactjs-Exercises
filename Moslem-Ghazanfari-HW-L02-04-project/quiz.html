<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>چالش دانش</title>
  <link rel="stylesheet" href="quiz.style.css">
</head>

<body class="body">
  
  <section id="section1" class="section1 borderbox"><!-- section1 borderbox -->
    <h1 class="title">محک سطح دانش</h1>
    <p class="p1">باانتخاب تعدادوسطح سختی سوال و همچنین دسته دانش مورد نظرتون خود را به چالش بکشید </p>
    <div>
      <p>دسته</p>
      <select id="category"></select>
    </div>
    <div>
      <p>سطح سختی سوال</p>
      <select id="Difficulty">
        <option value="easy">آسان</option>
        <option value="medium">متوسط</option>
        <option value="hard">سخت</option>
      </select>
    </div>
    <div class="countquestions">
      <p>تعداد سوال</p>
      <input type="number" id="countquestions" min="5" max="15" value="5">
    </div>
    <button id="btnstart" class="btnstart">شروع چالش</button>
  </section>

  <section id="section2" class="display-none">
    <div id="timer" class="timer"></div>
    <p class="question"></p>
    <div class="option">
      <input type="radio" id="option1" name="option" value="0">
      <label for="option1"></label><br>
      <input type="radio" id="option2" name="option" value="1">
      <label for="option2"></label><br>
      <input type="radio" id="option3" name="option" value="2">
      <label for="option3"> </label><br>
      <input type="radio" id="option4" name="option" value="3">
      <label for="option4"> </label><br>   
    </div>
    <div class="farsi">
      <span id="currANDtotal"></span>
      <span id="curresult"></span>
    </div>
    <button id="btnnext" class="btnnext" disabled>نمایش جواب</button>
  </section>
  <section id="section3" class="display-none">
    <div class="farsi">
      <h2>نتیجه تست</h2>
      <p id="result"></p>
    </div>
    <div class="list-question">
      <p class="farsi">لیست سوالات به همراه جواب</p>
      <ol id="list-question"></ol>
    </div>
    <button id="reload" class="btnstart">شروع چالش دیگر</button>
  </section>
  <script src="quiz.js"></script>
</body>

</html>
